<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>spotter.net</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(-45deg,#08111f,#102342,#183760,#0d1f36);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
color:white;
min-height:100vh;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,0.08),transparent 20%),
radial-gradient(circle at 80% 40%,rgba(255,255,255,0.05),transparent 20%),
radial-gradient(circle at 40% 80%,rgba(255,255,255,0.05),transparent 20%);
animation:particles 15s linear infinite;
pointer-events:none;
}

@keyframes particles{
0%{transform:translateY(0px);}
50%{transform:translateY(-25px);}
100%{transform:translateY(0px);}
}

header{
position:sticky;
top:0;
z-index:1000;
padding:22px;
font-size:38px;
font-weight:900;
text-align:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(14px);
letter-spacing:2px;
cursor:pointer;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

header::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
animation:shine 4s infinite;
}

@keyframes shine{
100%{left:120%;}
}

.container{
width:95%;
max-width:1500px;
margin:auto;
padding:30px 0;
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}
}

.search-box{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:35px;
}

.search-box input{
width:320px;
padding:15px;
border:none;
border-radius:16px;
outline:none;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
color:white;
font-size:16px;
transition:0.3s;
}

.search-box input::placeholder{
color:#dce7ff;
}

.search-box input:focus{
transform:scale(1.05);
box-shadow:0 0 25px rgba(84,156,255,0.8);
}

.search-box button,
.back-btn{
padding:15px 22px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#2f5fa7,#4f8dff);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.search-box button:hover,
.back-btn:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:0 0 30px rgba(79,141,255,0.8);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
position:relative;
padding:35px;
border-radius:24px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
overflow:hidden;
cursor:pointer;
text-align:center;
font-size:24px;
font-weight:bold;
transition:0.4s;
animation:cardAppear 0.8s ease;
border:1px solid rgba(255,255,255,0.08);
}

.card span{
position:relative;
z-index:2;
}

.card::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:conic-gradient(transparent,rgba(255,255,255,0.15),transparent 30%);
animation:rotate 5s linear infinite;
}

.card::after{
content:"";
position:absolute;
inset:3px;
background:rgba(10,20,35,0.92);
border-radius:22px;
}

@keyframes rotate{
100%{transform:rotate(360deg);}
}

@keyframes cardAppear{
from{
opacity:0;
transform:translateY(40px) scale(0.9);
}

to{
opacity:1;
transform:translateY(0) scale(1);
}
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 35px rgba(84,156,255,0.5);
}

.aircraft{
position:relative;
overflow:hidden;
border-radius:24px;
background:rgba(255,255,255,0.07);
backdrop-filter:blur(12px);
transition:0.4s;
animation:cardAppear 0.7s ease;
border:1px solid rgba(255,255,255,0.08);
}

.aircraft:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 0 40px rgba(0,0,0,0.45);
}

.aircraft img{
width:100%;
height:240px;
object-fit:cover;
display:block;
transition:0.6s;
cursor:pointer;
}

.aircraft:hover img{
transform:scale(1.12);
filter:brightness(1.1);
}

.info{
padding:18px;
}

.info h3{
font-size:22px;
margin-bottom:5px;
}

.info p{
color:#c8d7f0;
}

h2{
font-size:34px;
margin:25px 0;
text-align:center;
}

.hidden{
display:none;
}

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(15px);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:5000;
animation:viewerFade 0.3s ease;
}

@keyframes viewerFade{
from{opacity:0;}
to{opacity:1;}
}

#viewer img{
max-width:92%;
max-height:82%;
border-radius:20px;
box-shadow:0 0 45px rgba(255,255,255,0.2);
animation:zoom 0.3s ease;
}

@keyframes zoom{
from{
transform:scale(0.7);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}
}

#viewer h2{
margin-top:18px;
font-size:32px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:50px;
cursor:pointer;
transition:0.4s;
}

.close:hover{
transform:rotate(180deg) scale(1.2);
color:#4f8dff;
}

@media(max-width:700px){

header{
font-size:28px;
}

.aircraft img{
height:200px;
}

.grid{
grid-template-columns:1fr;
}

.search-box input{
width:100%;
}

}

</style>
</head>

function openAirline(name){

const home = document.getElementById("homePage");
const airlinePage = document.getElementById("airlinePage");
const title = document.getElementById("title");
const list = document.getElementById("list");

home.classList.add("hidden");
airlinePage.classList.remove("hidden");

title.innerText = name;
list.innerHTML = "";

airlines[name].forEach(a=>{

list.innerHTML += `
<div class="aircraft">
<img src="${a.photo}" onclick="openViewer('${a.photo}','${a.immat}')">
<div class="info">
<h3>${a.immat}</h3>
<p>${a.type}</p>
</div>
</div>
`;

});

}

function openAllAircraft(){

const home = document.getElementById("homePage");
const airlinePage = document.getElementById("airlinePage");
const title = document.getElementById("title");
const list = document.getElementById("list");

home.classList.add("hidden");
airlinePage.classList.remove("hidden");

title.innerText = "ALL AIRCRAFT";
list.innerHTML = "";

for(let airline in airlines){

airlines[airline].forEach(a=>{

list.innerHTML += `
<div class="aircraft">
<img src="${a.photo}" onclick="openViewer('${a.photo}','${a.immat}')">
<div class="info">

</div>
</div>
`;

});

}

}

function goHome(){
